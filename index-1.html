<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="노트">
<meta name="theme-color" content="#f5f2eb">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>노트</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #f7f7f5;
  --sidebar-bg: #efeeeb;
  --surface: #ffffff;
  --border: #e4e3df;
  --border-light: #f0efe c;
  --text: #1a1a1a;
  --text-muted: #888;
  --text-faint: #bbb;
  --accent: #4a6cf7;
  --accent-light: #eef0fe;
  --tag-bg: #ededeb;
  --hover: #f0efe b;
  --active-item: #e8e7e3;
  --sidebar-w: 220px;
}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  transition: transform 0.25s ease;
  z-index: 100;
}

.sidebar-header {
  padding: 20px 16px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.app-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
}
.new-note-btn {
  width: 28px; height: 28px;
  border-radius: 7px;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
  flex-shrink: 0;
}

.sidebar-search {
  margin: 0 12px 12px;
  position: relative;
}
.sidebar-search input {
  width: 100%;
  padding: 7px 10px 7px 30px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--text);
  outline: none;
}
.sidebar-search input:focus { border-color: var(--accent); }
.sidebar-search input::placeholder { color: var(--text-faint); }
.search-icon {
  position: absolute; left: 9px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-faint); font-size: 13px; pointer-events: none;
}

.sidebar-section {
  padding: 6px 12px 4px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-faint);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.sidebar-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px;
  border-radius: 7px;
  margin: 1px 6px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-muted);
  transition: background 0.1s;
  user-select: none;
}
.sidebar-item:hover { background: var(--active-item); }
.sidebar-item.active { background: var(--active-item); color: var(--text); font-weight: 500; }
.sidebar-item .icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
.sidebar-item .count {
  margin-left: auto;
  font-size: 11px;
  color: var(--text-faint);
  background: var(--border);
  padding: 1px 6px;
  border-radius: 10px;
}

.notebook-add {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  margin: 1px 6px;
  font-size: 12px;
  color: var(--accent);
  cursor: pointer;
  border-radius: 7px;
}
.notebook-add:hover { background: var(--active-item); }

/* tag list */
.tag-list {
  display: flex; flex-wrap: wrap; gap: 5px;
  padding: 4px 12px 8px;
}
.tag-chip {
  font-size: 11px;
  padding: 3px 8px;
  background: var(--tag-bg);
  border-radius: 20px;
  color: var(--text-muted);
  cursor: pointer;
  transition: background 0.1s;
}
.tag-chip:hover, .tag-chip.active { background: var(--accent-light); color: var(--accent); }

.sidebar-bottom {
  margin-top: auto;
  padding: 12px;
  border-top: 1px solid var(--border);
}

/* ── NOTE LIST ── */
.note-list-panel {
  width: 260px;
  min-width: 260px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.panel-header {
  padding: 16px 16px 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.panel-title { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
.panel-count { font-size: 12px; color: var(--text-muted); }

.note-list { overflow-y: auto; flex: 1; }
.note-list::-webkit-scrollbar { width: 4px; }
.note-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.note-item {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  user-select: none;
}
.note-item:hover { background: var(--bg); }
.note-item.active { background: var(--accent-light); }
.note-item-title {
  font-size: 13px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 4px;
  color: var(--text);
}
.note-item.active .note-item-title { color: var(--accent); }
.note-item-preview {
  font-size: 12px; color: var(--text-muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 5px;
}
.note-item-meta {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--text-faint);
}
.note-item-tag {
  background: var(--tag-bg);
  padding: 1px 6px; border-radius: 10px;
  font-size: 10px; color: var(--text-muted);
}
.empty-list {
  padding: 40px 20px;
  text-align: center;
  color: var(--text-faint);
  font-size: 13px;
  line-height: 2;
}

/* ── EDITOR ── */
.editor-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: var(--surface);
  overflow: hidden;
}

.editor-toolbar {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.toolbar-btn {
  padding: 5px 8px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-size: 13px;
  border-radius: 5px;
  cursor: pointer;
  transition: background 0.1s, color 0.1s;
}
.toolbar-btn:hover { background: var(--bg); color: var(--text); }
.toolbar-sep { width: 1px; height: 16px; background: var(--border); margin: 0 2px; }
.toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
.save-indicator { font-size: 11px; color: var(--text-faint); }

.editor-meta {
  padding: 20px 24px 0;
  pointer-events: auto;
  position: relative;
  z-index: 1;
}
.editor-title {
  width: 100%;
  font-size: 22px;
  font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  border: none;
  outline: none;
  background: transparent;
  color: var(--text);
  letter-spacing: -0.02em;
  margin-bottom: 8px;
  resize: none;
  overflow: hidden;
  line-height: 1.3;
  display: block;
  pointer-events: auto;
  -webkit-user-select: text;
  user-select: text;
  cursor: text;
  min-height: 32px;
}
.editor-title::placeholder { color: var(--text-faint); }

.editor-tags-row {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  margin-bottom: 4px;
}
.editor-tag {
  display: flex; align-items: center; gap: 4px;
  background: var(--accent-light);
  color: var(--accent);
  padding: 2px 8px; border-radius: 20px; font-size: 11px;
}
.remove-tag {
  cursor: pointer; font-size: 13px; line-height: 1;
  color: var(--accent); opacity: 0.6;
}
.remove-tag:hover { opacity: 1; }
.tag-input-inline {
  border: none; outline: none; background: transparent;
  font-size: 12px; font-family: 'Noto Sans KR', sans-serif;
  color: var(--text-muted); min-width: 80px;
}
.tag-input-inline::placeholder { color: var(--text-faint); }

.notebook-badge {
  font-size: 11px;
  color: var(--text-muted);
  background: var(--tag-bg);
  padding: 2px 8px; border-radius: 20px;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 4px;
}

.editor-divider {
  height: 1px; background: var(--border);
  margin: 12px 24px 0;
}

.editor-body {
  flex: 1;
  padding: 16px 24px 40px;
  overflow-y: auto;
}
.editor-body::-webkit-scrollbar { width: 4px; }
.editor-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

#noteContent {
  width: 100%; height: 100%;
  border: none; outline: none; resize: none;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px; line-height: 1.9;
  color: var(--text);
  background: transparent;
}
#noteContent::placeholder { color: var(--text-faint); }

.no-note {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--text-faint); gap: 10px;
}
.no-note .big-icon { font-size: 40px; opacity: 0.3; }
.no-note p { font-size: 13px; }

/* ── NOTEBOOK DROPDOWN ── */
.dropdown {
  position: fixed; z-index: 999;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  min-width: 160px;
  overflow: hidden;
  display: none;
}
.dropdown.show { display: block; }
.dropdown-item {
  padding: 9px 14px;
  font-size: 13px;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
}
.dropdown-item:hover { background: var(--bg); }
.dropdown-item.active { color: var(--accent); font-weight: 500; }

/* ── MOBILE ── */
.mobile-bar {
  display: none;
  position: fixed; top: 0; left: 0; right: 0;
  height: 50px;
  background: var(--sidebar-bg);
  border-bottom: 1px solid var(--border);
  align-items: center;
  padding: 0 12px;
  gap: 10px;
  z-index: 200;
}
.mobile-bar .app-name { flex: 1; }
.menu-btn, .back-btn {
  width: 32px; height: 32px;
  border: none; background: transparent;
  font-size: 18px; cursor: pointer; color: var(--text);
  display: flex; align-items: center; justify-content: center;
  border-radius: 7px;
}
.menu-btn:hover, .back-btn:hover { background: var(--active-item); }

.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.2); z-index: 99;
}
.overlay.show { display: block; }

/* ── MODAL ── */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.3); z-index: 500;
  align-items: center; justify-content: center;
}
.modal-bg.show { display: flex; }
.modal {
  background: var(--surface);
  border-radius: 14px;
  padding: 24px;
  width: 300px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
.modal input {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none;
  color: var(--text);
}
.modal input:focus { border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
.modal-btn {
  padding: 8px 16px; border-radius: 8px; border: none;
  font-size: 13px; font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; font-weight: 500;
}
.modal-btn.cancel { background: var(--bg); color: var(--text-muted); }
.modal-btn.confirm { background: var(--accent); color: white; }

.install-banner {
  display: none;
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  padding: 14px 16px;
  width: calc(100% - 32px); max-width: 400px;
  z-index: 999;
  align-items: center; gap: 12px;
}
.install-banner.show { display: flex; }
.install-banner-text { flex: 1; }
.install-banner-text strong { display: block; font-size: 13px; margin-bottom: 2px; }
.install-banner-text span { font-size: 11px; color: var(--text-muted); }
.install-btn {
  padding: 8px 14px; background: var(--accent); color: white;
  border: none; border-radius: 8px; font-size: 13px; font-weight: 700;
  cursor: pointer; white-space: nowrap; font-family: 'Noto Sans KR', sans-serif;
}
.install-close {
  background: none; border: none; color: var(--text-muted);
  font-size: 18px; cursor: pointer; padding: 0 2px; line-height: 1;
}

@media (max-width: 700px) {
  .mobile-bar { display: flex; }
  body { padding-top: 50px; height: calc(100vh - 50px); }
  .sidebar {
    position: fixed; top: 50px; left: 0; bottom: 0;
    transform: translateX(-100%);
  }
  .sidebar.open { transform: translateX(0); box-shadow: 4px 0 20px rgba(0,0,0,0.1); }
  .note-list-panel {
    position: fixed; top: 50px; left: 0; right: 0; bottom: 0;
    width: 100%; min-width: 0;
    display: none;
    z-index: 50;
  }
  .note-list-panel.open { display: flex; }
  .editor-panel { position: fixed; top: 50px; left: 0; right: 0; bottom: 0; display: none; }
  .editor-panel.open { display: flex; }
}
</style>
</head>
<body>

<!-- Install banner -->
<div class="install-banner" id="installBanner">
  <div class="install-banner-text">
    <strong>앱으로 설치하기</strong>
    <span id="installHint">홈 화면에 추가하면 앱처럼 쓸 수 있어</span>
  </div>
  <button class="install-btn" id="installBtn">설치</button>
  <button class="install-close" onclick="document.getElementById('installBanner').classList.remove('show')">✕</button>
</div>

<!-- Mobile top bar -->
<div class="mobile-bar">
  <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()">☰</button>
  <span class="app-name" id="mobileTitle">노트</span>
  <button class="new-note-btn" onclick="newNote()" title="새 노트">+</button>
</div>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="app-name">노트</span>
    <button class="new-note-btn" onclick="newNote()" title="새 노트">+</button>
  </div>

  <div class="sidebar-search">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="검색" id="searchInput" oninput="onSearch(this.value)">
  </div>

  <div class="sidebar-section">보기</div>
  <div class="sidebar-item active" id="nav-all" onclick="setView('all')">
    <span class="icon">📝</span> 모든 노트 <span class="count" id="count-all">0</span>
  </div>

  <div class="sidebar-section" style="margin-top:8px">노트북</div>
  <div id="notebookList"></div>
  <div class="notebook-add" onclick="openNewNotebook()">
    <span style="font-size:15px">+</span> 새 노트북
  </div>

  <div class="sidebar-section" style="margin-top:8px">태그</div>
  <div class="tag-list" id="tagList"></div>
</div>

<!-- NOTE LIST -->
<div class="note-list-panel" id="noteListPanel">
  <div class="panel-header">
    <span class="panel-title" id="panelTitle">모든 노트</span>
    <span class="panel-count" id="panelCount"></span>
  </div>
  <div class="note-list" id="noteList"></div>
</div>

<!-- EDITOR -->
<div class="editor-panel" id="editorPanel">
  <div class="editor-toolbar">
    <button class="toolbar-btn" onclick="goBack()" id="backBtn" title="목록으로" style="display:none">← 목록</button>
    <button class="toolbar-btn" onclick="formatBold()" title="굵게"><b>B</b></button>
    <button class="toolbar-btn" onclick="formatItalic()" title="기울임"><i>I</i></button>
    <div class="toolbar-sep"></div>
    <button class="toolbar-btn" onclick="deleteCurrentNote()" title="삭제" style="color:#e55">🗑</button>
    <div class="toolbar-right">
      <span class="save-indicator" id="saveIndicator"></span>
    </div>
  </div>

  <div class="editor-meta" id="editorMeta" style="display:none">
    <textarea id="noteTitle" class="editor-title" placeholder="제목" rows="1" oninput="autoResize(this); autoSave()"></textarea>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px">
      <span class="notebook-badge" id="notebookBadge" onclick="openNotebookDropdown()">
        📓 <span id="notebookBadgeText">노트북 없음</span> ▾
      </span>
      <div class="editor-tags-row" id="tagsRow">
        <input class="tag-input-inline" id="tagInput" placeholder="+ 태그 추가"
          onkeydown="handleTagInput(event)" onfocus="this.placeholder='태그 입력 후 Enter'" onblur="this.placeholder='+ 태그 추가'">
      </div>
    </div>
    <div class="editor-divider"></div>
  </div>

  <div class="editor-body" id="editorBody">
    <div class="no-note" id="noNoteMsg">
      <div class="big-icon">📝</div>
      <p>노트를 선택하거나 새로 만들어봐</p>
    </div>
    <textarea id="noteContent" placeholder="내용을 입력해…" oninput="autoSave()" style="display:none"></textarea>
  </div>
</div>

<!-- Notebook dropdown -->
<div class="dropdown" id="notebookDropdown"></div>

<!-- New notebook modal -->
<div class="modal-bg" id="notebookModal">
  <div class="modal">
    <h3>새 노트북</h3>
    <input type="text" id="notebookNameInput" placeholder="노트북 이름" onkeydown="if(event.key==='Enter')confirmNewNotebook()">
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">취소</button>
      <button class="modal-btn confirm" onclick="confirmNewNotebook()">만들기</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let state = {
  notes: [],
  notebooks: [],
  currentNoteId: null,
  currentView: 'all',       // 'all' | 'notebook:{id}' | 'tag:{tag}' | 'search'
  searchQuery: '',
};

let saveTimer = null;

// ── STORAGE ──
function persist() {
  localStorage.setItem('noteapp', JSON.stringify({ notes: state.notes, notebooks: state.notebooks }));
}
function hydrate() {
  try {
    const d = JSON.parse(localStorage.getItem('noteapp') || '{}');
    state.notes = d.notes || [];
    state.notebooks = d.notebooks || [];
  } catch {}
}

// ── ID ──
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ── NOTE OPS ──
function newNote() {
  const note = {
    id: uid(), title: '', content: '',
    notebookId: currentNotebookFilter() || null,
    tags: [],
    createdAt: Date.now(), updatedAt: Date.now(),
  };
  state.notes.unshift(note);
  persist();
  openNote(note.id);
  renderAll();
  closeSidebar();
  setTimeout(() => document.getElementById('noteTitle').focus(), 100);
}

function currentNotebookFilter() {
  if (state.currentView.startsWith('notebook:')) return state.currentView.split(':')[1];
  return null;
}

function saveCurrentNote() {
  if (!state.currentNoteId) return;
  const note = state.notes.find(n => n.id === state.currentNoteId);
  if (!note) return;
  note.title = document.getElementById('noteTitle').value;
  note.content = document.getElementById('noteContent').value;
  note.updatedAt = Date.now();
  persist();
  renderNoteList();
  document.getElementById('saveIndicator').textContent = '저장됨';
  setTimeout(() => document.getElementById('saveIndicator').textContent = '', 1500);
}

function autoSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveCurrentNote, 600);
}

function openNote(id) {
  if (state.currentNoteId) saveCurrentNote();
  state.currentNoteId = id;
  const note = state.notes.find(n => n.id === id);
  if (!note) return;

  document.getElementById('noteTitle').value = note.title;
  document.getElementById('noteContent').value = note.content;
  document.getElementById('noNoteMsg').style.display = 'none';
  document.getElementById('noteContent').style.display = 'block';
  document.getElementById('editorMeta').style.display = 'block';

  // notebook badge
  const nb = state.notebooks.find(n => n.id === note.notebookId);
  document.getElementById('notebookBadgeText').textContent = nb ? nb.name : '노트북 없음';

  // tags
  renderEditorTags(note.tags);

  // autoResize title
  autoResize(document.getElementById('noteTitle'));

  // mark active in list
  document.querySelectorAll('.note-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  // mobile: show editor
  if (window.innerWidth <= 700) {
    document.getElementById('noteListPanel').classList.remove('open');
    document.getElementById('editorPanel').classList.add('open');
    document.getElementById('backBtn').style.display = '';
    document.getElementById('mobileTitle').textContent = note.title || '새 노트';
  }
}

function deleteCurrentNote() {
  if (!state.currentNoteId) return;
  if (!confirm('이 노트를 삭제할까?')) return;
  state.notes = state.notes.filter(n => n.id !== state.currentNoteId);
  state.currentNoteId = null;
  persist();
  document.getElementById('noNoteMsg').style.display = 'flex';
  document.getElementById('noteContent').style.display = 'none';
  document.getElementById('editorMeta').style.display = 'none';
  renderAll();
  goBack();
}

// ── NOTEBOOK OPS ──
function openNewNotebook() {
  document.getElementById('notebookNameInput').value = '';
  document.getElementById('notebookModal').classList.add('show');
  setTimeout(() => document.getElementById('notebookNameInput').focus(), 100);
}
function closeModal() { document.getElementById('notebookModal').classList.remove('show'); }
function confirmNewNotebook() {
  const name = document.getElementById('notebookNameInput').value.trim();
  if (!name) return;
  const nb = { id: uid(), name };
  state.notebooks.push(nb);
  persist();
  closeModal();
  renderAll();
}

// ── TAG OPS ──
function handleTagInput(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.replace(',','').trim();
    if (!val) return;
    const note = state.notes.find(n => n.id === state.currentNoteId);
    if (!note) return;
    if (!note.tags.includes(val)) {
      note.tags.push(val);
      persist();
      renderEditorTags(note.tags);
      renderTagSidebar();
    }
    e.target.value = '';
  }
}
function removeTag(tag) {
  const note = state.notes.find(n => n.id === state.currentNoteId);
  if (!note) return;
  note.tags = note.tags.filter(t => t !== tag);
  persist();
  renderEditorTags(note.tags);
  renderTagSidebar();
}
function renderEditorTags(tags) {
  const row = document.getElementById('tagsRow');
  const input = document.getElementById('tagInput');
  row.innerHTML = '';
  tags.forEach(t => {
    const chip = document.createElement('span');
    chip.className = 'editor-tag';
    chip.innerHTML = `# ${t} <span class="remove-tag" onclick="removeTag('${t}')">×</span>`;
    row.appendChild(chip);
  });
  row.appendChild(input);
}

// ── NOTEBOOK DROPDOWN ──
function openNotebookDropdown() {
  const badge = document.getElementById('notebookBadge');
  const rect = badge.getBoundingClientRect();
  const dd = document.getElementById('notebookDropdown');
  dd.innerHTML = '';

  const note = state.notes.find(n => n.id === state.currentNoteId);

  [{ id: null, name: '노트북 없음' }, ...state.notebooks].forEach(nb => {
    const item = document.createElement('div');
    item.className = 'dropdown-item' + (note && note.notebookId === nb.id ? ' active' : '');
    item.textContent = nb.name;
    item.onclick = () => {
      if (note) { note.notebookId = nb.id; persist(); }
      document.getElementById('notebookBadgeText').textContent = nb.name || '노트북 없음';
      dd.classList.remove('show');
      renderNotebookSidebar();
    };
    dd.appendChild(item);
  });

  dd.style.top = (rect.bottom + 4) + 'px';
  dd.style.left = rect.left + 'px';
  dd.classList.add('show');
}
document.addEventListener('click', e => {
  if (!e.target.closest('#notebookBadge') && !e.target.closest('#notebookDropdown')) {
    document.getElementById('notebookDropdown').classList.remove('show');
  }
});

// ── VIEW ──
function setView(view) {
  state.currentView = view;
  state.searchQuery = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + view);
  if (navEl) navEl.classList.add('active');
  renderNoteList();
  closeSidebar();

  if (window.innerWidth <= 700) {
    document.getElementById('noteListPanel').classList.add('open');
    document.getElementById('editorPanel').classList.remove('open');
  }
}

function onSearch(q) {
  state.searchQuery = q;
  state.currentView = q ? 'search' : 'all';
  renderNoteList();
}

function filteredNotes() {
  let notes = [...state.notes];
  const q = state.searchQuery.toLowerCase();
  if (q) {
    notes = notes.filter(n =>
      n.title.toLowerCase().includes(q) ||
      n.content.toLowerCase().includes(q) ||
      n.tags.some(t => t.toLowerCase().includes(q))
    );
  } else if (state.currentView.startsWith('notebook:')) {
    const nbId = state.currentView.split(':')[1];
    notes = notes.filter(n => n.notebookId === nbId);
  } else if (state.currentView.startsWith('tag:')) {
    const tag = state.currentView.split(':')[1];
    notes = notes.filter(n => n.tags.includes(tag));
  }
  return notes.sort((a, b) => b.updatedAt - a.updatedAt);
}

// ── RENDER ──
function renderAll() {
  renderNotebookSidebar();
  renderTagSidebar();
  renderNoteList();
  updateCounts();
}

function renderNotebookSidebar() {
  const list = document.getElementById('notebookList');
  list.innerHTML = '';
  state.notebooks.forEach(nb => {
    const count = state.notes.filter(n => n.notebookId === nb.id).length;
    const item = document.createElement('div');
    item.className = 'sidebar-item' + (state.currentView === 'notebook:' + nb.id ? ' active' : '');
    item.id = 'nav-notebook:' + nb.id;
    item.innerHTML = `<span class="icon">📓</span> ${nb.name} <span class="count">${count}</span>`;
    item.onclick = () => setView('notebook:' + nb.id);
    list.appendChild(item);
  });
}

function renderTagSidebar() {
  const allTags = [...new Set(state.notes.flatMap(n => n.tags))];
  const list = document.getElementById('tagList');
  list.innerHTML = '';
  allTags.forEach(tag => {
    const chip = document.createElement('span');
    chip.className = 'tag-chip' + (state.currentView === 'tag:' + tag ? ' active' : '');
    chip.textContent = '# ' + tag;
    chip.onclick = () => setView('tag:' + tag);
    list.appendChild(chip);
  });
}

function renderNoteList() {
  const notes = filteredNotes();
  const list = document.getElementById('noteList');
  list.innerHTML = '';

  // panel title
  let title = '모든 노트';
  if (state.searchQuery) title = `"${state.searchQuery}" 검색 결과`;
  else if (state.currentView.startsWith('notebook:')) {
    const nb = state.notebooks.find(n => n.id === state.currentView.split(':')[1]);
    title = nb ? nb.name : '노트북';
  } else if (state.currentView.startsWith('tag:')) title = '# ' + state.currentView.split(':')[1];
  document.getElementById('panelTitle').textContent = title;
  document.getElementById('panelCount').textContent = notes.length + '개';
  if (window.innerWidth <= 700) document.getElementById('mobileTitle').textContent = title;

  if (!notes.length) {
    list.innerHTML = `<div class="empty-list">노트가 없어<br><span style="font-size:11px">+ 버튼으로 새 노트를 만들어봐</span></div>`;
    return;
  }

  notes.forEach(note => {
    const item = document.createElement('div');
    item.className = 'note-item' + (note.id === state.currentNoteId ? ' active' : '');
    item.dataset.id = note.id;
    const date = new Date(note.updatedAt).toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
    const tagHtml = note.tags.slice(0,2).map(t => `<span class="note-item-tag">#${t}</span>`).join('');
    item.innerHTML = `
      <div class="note-item-title">${note.title || '제목 없음'}</div>
      <div class="note-item-preview">${note.content.slice(0,60) || '내용 없음'}</div>
      <div class="note-item-meta">${date} ${tagHtml}</div>`;
    item.onclick = () => openNote(note.id);
    list.appendChild(item);
  });
}

function updateCounts() {
  document.getElementById('count-all').textContent = state.notes.length;
}

// ── UTILS ──
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function formatBold() {
  const ta = document.getElementById('noteContent');
  const s = ta.selectionStart, e = ta.selectionEnd;
  const sel = ta.value.slice(s, e);
  ta.value = ta.value.slice(0,s) + '**' + sel + '**' + ta.value.slice(e);
  ta.focus(); autoSave();
}
function formatItalic() {
  const ta = document.getElementById('noteContent');
  const s = ta.selectionStart, e = ta.selectionEnd;
  const sel = ta.value.slice(s, e);
  ta.value = ta.value.slice(0,s) + '*' + sel + '*' + ta.value.slice(e);
  ta.focus(); autoSave();
}

// ── MOBILE NAV ──
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  sb.classList.toggle('open');
  ov.classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
function goBack() {
  if (window.innerWidth <= 700) {
    saveCurrentNote();
    document.getElementById('editorPanel').classList.remove('open');
    document.getElementById('noteListPanel').classList.add('open');
    document.getElementById('mobileTitle').textContent = document.getElementById('panelTitle').textContent;
  }
}

// ── INIT ──
hydrate();
renderAll();

// mobile: start on note list
if (window.innerWidth <= 700) {
  document.getElementById('noteListPanel').classList.add('open');
}

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ── PWA INSTALL ──
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').classList.remove('show');
});
window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').classList.remove('show');
});

// iOS 안내
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone;
if (isIOS && !isStandalone) {
  document.getElementById('installBtn').style.display = 'none';
  document.getElementById('installHint').textContent = 'Safari → 공유 버튼 → 홈 화면에 추가';
  document.getElementById('installBanner').classList.add('show');
}
</script>
